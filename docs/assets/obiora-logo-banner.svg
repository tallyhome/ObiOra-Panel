<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-label="ObiOra Panel  Seedbox Management Platform">
  <defs>
    <linearGradient id="obiora-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3dd68c"/>
      <stop offset="100%" stop-color="#2ab872"/>
    </linearGradient>
    <linearGradient id="obiora-grad-soft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3dd68c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="obiora-glow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#3dd68c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3dd68c" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3dd68c" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="obiora-bg-glow" cx="18%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#3dd68c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0f0f14" stop-opacity="0"/>
    </radialGradient>
    <filter id="obiora-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond bannière -->
  <rect width="720" height="180" rx="20" fill="#0f0f14"/>
  <rect width="720" height="180" rx="20" fill="url(#obiora-bg-glow)"/>
  <rect x="1" y="1" width="718" height="178" rx="19" fill="none" stroke="#2d2d42" stroke-width="1"/>
  <rect x="24" y="24" width="672" height="132" rx="16" fill="url(#obiora-grad-soft)" opacity="0.55"/>

  <!-- Emblème (agrandi) -->
  <g transform="translate(114 90)">
    <circle r="54" fill="#16161f" stroke="#2d2d42" stroke-width="1.5"/>
    <circle r="54" fill="none" stroke="url(#obiora-grad)" stroke-width="3.5" opacity="0.95"/>
    <ellipse cx="0" cy="0" rx="64" ry="14" fill="url(#obiora-glow)" transform="rotate(-12)"/>

    <circle r="24" fill="none" stroke="url(#obiora-grad)" stroke-width="4.5"/>

    <path d="M0 -36 v13" stroke="#3dd68c" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M-6.5 -29.5 L0 -36 L6.5 -29.5" stroke="#3dd68c" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <circle cx="32" cy="-8" r="3.5" fill="#3dd68c" opacity="0.9"/>
    <circle cx="-30" cy="11" r="3.5" fill="#6366f1" opacity="0.8"/>
    <path d="M21 -4 L-25 9" stroke="#3dd68c" stroke-width="1.5" opacity="0.35"/>
  </g>

  <!-- Texte principal -->
  <text x="210" y="78" font-family="Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="52" font-weight="700" fill="#f4f4f8" letter-spacing="-1.2">ObiOra</text>
  <text x="430" y="78" font-family="Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="500" fill="#9b9bb0">Panel</text>

  <text x="212" y="112" font-family="Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="600" fill="url(#obiora-grad)" letter-spacing="0.38em">SEEDBOX MANAGEMENT</text>

  <rect x="212" y="124" width="120" height="3.5" rx="1.75" fill="url(#obiora-grad)" opacity="0.9"/>

  <text x="212" y="152" font-family="Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="400" fill="#7a7a94">Laravel · Livewire · Linux · Docker · Monitoring</text>

  <!-- Pastille accent -->
  <g transform="translate(598 42)">
    <rect width="88" height="28" rx="14" fill="#16161f" stroke="#2d2d42"/>
    <circle cx="18" cy="14" r="5" fill="url(#obiora-grad)" filter="url(#obiora-soft)"/>
    <text x="30" y="18" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" fill="#c8c8d8">Open Source</text>
  </g>
</svg>
