name: Obiora Doctor CI

on:
  push:
    paths:
      - 'ObiOra-Doctor/**'
  pull_request:
    paths:
      - 'ObiOra-Doctor/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ObiOra-Doctor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: ShellCheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck obiora.sh obiora-doctor.sh install/install-agent.sh || true
